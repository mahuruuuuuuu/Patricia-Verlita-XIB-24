<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Web Mahuru - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Mahuru</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav2">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav2">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div id="profileCard" class="card text-center shadow profile-card">
          <div class="card-body">
            <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="profile" class="rounded-circle mb-3" width="100">
            <h3 class="card-title mb-2" id="namaProfile">Mahuru</h3>
            <p class="card-text" id="descProfile">Mahasiswa Teknik Informatika, suka belajar dan coding!</p>
            <div class="mb-3">
              <button onclick="ubahWarna('primary')" class="btn btn-primary btn-sm">Biru</button>
              <button onclick="ubahWarna('success')" class="btn btn-success btn-sm">Hijau</button>
              <button onclick="ubahWarna('danger')" class="btn btn-danger btn-sm">Merah</button>
              <button onclick="ubahWarna('info')" class="btn btn-info btn-sm">Default</button>
            </div>
            <button onclick="ubahNama()" class="btn btn-dark btn-sm">Ganti Nama (Fitur JS)</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/profile.js"></script>
</body>
</html>
