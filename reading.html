<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Tarot Wisdom Hub - Reading</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Tarot Wisdom Hub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navb2">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navb2">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="reading.html" class="nav-link active">Reading</a></li>
          <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="text-center mb-4 fancy-title">Tarot Reading</h2>
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <div class="tarot-flip-card mb-3 mx-auto">
          <div class="tarot-flip-inner" id="tarotCard">
            <div class="tarot-flip-front d-flex align-items-center justify-content-center">
              <img src="https://cdn.pixabay.com/photo/2016/04/01/09/24/tarot-1294641_1280.png" width="120" alt="Kartu Tarot Belakang">
            </div>
            <div class="tarot-flip-back d-flex align-items-center justify-content-center flex-column">
              <img id="drawn-img" src="" width="120" class="mb-2" alt="Kartu Tarot">
              <h5 id="drawn-name"></h5>
              <p id="drawn-meaning" class="mb-0"></p>
            </div>
          </div>
        </div>
        <button class="btn btn-warning btn-lg mb-2" onclick="drawCard()">Draw a Card</button>
        <p id="reading-note" class="text-secondary small">Klik tombol untuk melihat kartu tarot harianmu!</p>
      </div>
    </div>
  </main>
  <footer class="footer text-center py-3 text-light bg-dark">
    <small>&copy; 2026 Tarot Wisdom Hub.</small>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
